<html>
<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>

<body>
	<nav class="navbar navbar-default">
		<div class="container-fluid">
			<div class="navbar-header">
				<button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar" aria-expanded="false" aria-controls="navbar">
					<span class="sr-only">Toggle navigation</span>
					<span class="icon-bar"></span>
					<span class="icon-bar"></span>
					<span class="icon-bar"></span>
				</button>
				<a class="navbar-brand" href="#">Sistema de Cadastro Unico</a>
			</div>
			<div id="navbar" class="navbar-collapse collapse">
				<ul class="nav navbar-nav">
					<li>
						<a href="vendas.html">Vendas</a>
					</li>
					<li>
						<a href="Estoque.html">Estoque</a>
					</li>
					<li>
						<a href="Estoque.html">Contatos</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>
	<div class="container">
		<div class="modal fade" id="myModal" role="dialog">
			<div class="modal-dialog">
				<div class="panel panel-default">
					<div class="panel-heading">
						<h3 class="panel-title text-center">CADASTRO DE CLIENTE</h3>
					</div>
					
					<div class="panel-body">
						<form action="#" class="form-horizontal">
							<fieldset>
								<legend>Dados Pessoais</legend>
								<div class="form-group">
									<label for="Documento" class="col-sm-2 control-label">Documento</label>
									<div class="col-sm-4">
										<input type="text" class="form-control" id="Documento">
									</div>
								</div>												
								
								<div class="form-group">
									<label for="nome" class="col-sm-2 control-label">Nome</label>
									<div class="col-sm-4">
										<input type="text" class="form-control" id="nome">
									</div>
								</div>
								
								<div class="form-group">
									<label class="col-sm-2 control-label">Sexo</label>
									<div class="col-sm-4">
										<label style="display:inline-block; margin-right:15px;">
											<input type="radio" name="sexo" value="FEMININO"> Feminino
										</label>
										<label style="display:inline-block;">
											<input type="radio" name="sexo" value="MASCULINO"> Masculino
										</label>
									</div>
								</div>
								
							</fieldset>
							
							<fieldset>
								<legend>Contato</legend>
								<div class="form-group">
									<label for="email" class="col-sm-2 control-label">Email</label>
									<div class="col-sm-4">
										<input type="email" class="form-control" id="email">
									</div>
								</div>
								
								<div class="form-group">
									<label for="telefone" class="col-sm-2 control-label">Telefone</label>
									<div class="col-sm-4">
										<input type="tel" class="form-control" id="telefone">
									</div>
								</div>
								<div class="form-group">
									<label for="fax" class="col-sm-2 control-label">Fax</label>
									<div class="col-sm-4">
										<input type="tel" class="form-control" id="fax">
									</div>
								</div>
							</fieldset>
							
							<fieldset>
								<div class="form-group">
									<label for="uf" class="col-sm-2 control-label">UF</label>
									<div class="col-sm-4">
										<select class="form-control" name="uf" id="uf">
											<option value="AC">AC</option>
											<option value="AL">AL</option>
											<option value="AM">AM</option>
											<option value="AP">AP</option>
											<option value="BA">BA</option>
											<option value="CE">CE</option>
											<option value="DF">DF</option>
											<option value="ES">ES</option>
											<option value="GO">GO</option>
											<option value="MA">MA</option>
											<option value="MG">MG</option>
											<option value="MS">MS</option>
											<option value="MT">MT</option>
											<option value="PA">PA</option>
											<option value="PE">PE</option>
											<option value="PI">PI</option>
											<option value="PR">PR</option>
											<option value="RJ">RJ</option>
											<option value="RN">RN</option>
											<option value="RO">RO</option>
											<option value="RR">RR</option>
											<option value="RS">RS</option>
											<option value="SC">SC</option>
											<option value="SE">SE</option>
											<option value="SP">SP</option>
											<option value="TO">TO</option>
										</select>
									</div>
								</div>
							</fieldset>
							
							<button type="button" class="btn btn-primary" onclick="javascript:SalvarCadastro();">
								<span class="glyphicon glyphicon-floppy-disk" aria-hidden="true"></span> Gravar
							</button>
						</form>
						
					</div>
				</div>
			</div>
		</div>
		<div id="alertaDiv" class="alert alert-dismissible" role="alert" style="display:none; margin-top:15px;">
			<button type="button" class="close" data-dismiss="alert" aria-label="Fechar" onclick="$('#alertaDiv').hide();">
				<span aria-hidden="true">&times;</span>
			</button>
			<span id="alertaMensagem"></span>
		</div>

		<div class="panel panel-default">
			<div class="panel-heading">
				<h3 class="panel-title text-center">CLIENTES CADASTRADOS</h3>
			</div>
			
			<div class="panel-body">
				<a  data-toggle="modal" data-target="#myModal" class="btn btn-primary">
					<span class="glyphicon glyphicon-plus" aria-hidden="true"></span> Novo
				</a>	
				<div class="table-responsive">
					<table id="ListaCadastro" class="table table-striped table-hover">
						<thead>
							<tr>
								<th>Documento</th>
								<th>NOME</th>
								<th>EMAIL</th>
								<th>TELEFONE</th>
								<th>AÇÕES</th>
							</tr>
						</thead>
					</table>
				</div>
			</div>
		</div>
	</div>
	
	<script>
		function mostrarAlerta(mensagem, tipo) {
			var div = $('#alertaDiv');
			div.removeClass('alert-success alert-danger alert-warning alert-info');
			div.addClass('alert-' + tipo);
			$('#alertaMensagem').text(mensagem);
			div.show();
			setTimeout(function () { div.fadeOut(); }, 5000);
		}

		ListarClientes();

		function SalvarCadastro()
		{

            var Clientes = {};

            Clientes.documento = $("#Documento").val();
            Clientes.nome= $("#nome").val();
            Clientes.email= $("#email").val();
			Clientes.telefone = $("#telefone").val();
			Clientes.fax = $("#fax").val();
			Clientes.uf = $("#uf").val();
            Clientes.sexo = $('input[name="sexo"]:checked').val();

            var validar = 1;
			
            if (Clientes.documento == "")
			{
				validar = 0;
				mostrarAlerta('O campo Documento é obrigatório.', 'warning');
				$("#Documento").css("background-color", "#f9d6d6");
			}

            if (Clientes.nome == "")
			{
				mostrarAlerta('O campo Nome é obrigatório.', 'warning');
				$("#nome").css("background-color", "#f9d6d6");
				validar = 0;
			}
			
			if(validar == 1)
			{
                $.ajax({
                    type: "POST",
                    url: "https://localhost:44352/api/Clientes/Salvar",
                    data: JSON.stringify(Clientes),
                    contentType: "application/json; charset=utf-8",
                    dataType: "json",
                    success: function (msg) {
						mostrarAlerta('Cadastro salvo com sucesso!', 'success');
                        location.reload();
                    },
                    error: function (msg) {
                        mostrarAlerta('Erro ao salvar o cadastro.', 'danger');
                    }

				});
				

                //AdicionarLinhaTabela(Clientes.documento, Clientes.nome, Clientes.email, Clientes.telefone);
				LimparCamposForm();
			}
		}
		function AdicionarLinhaTabela(Documento, Nome, Email, Telefone)
		{			
			var linhaNova = '<tr style="margin:5px" id="Linha'+Documento+'"><td>' 
            linhaNova = linhaNova + Documento + '</td><td>' + Nome + '</td><td>' + Email + '</td><td>' + Telefone + '</td><td><a href="#" onclick="javascript:GetCliente(' + Documento +');" style="margin-right: 5px" class="btn btn-info" style="margin-right: 5px;"><span class="glyphicon glyphicon-edit" aria-hidden="true"></span> Editar</a><a href="#" onclick="javascript:RemoveLinha('+Documento+');" class="btn btn-danger"><span class="glyphicon glyphicon-trash" aria-hidden="true"></span> Excluir</a></td></tr>';
			
			$("#ListaCadastro").prepend(linhaNova);
			$('#myModal').modal().hide();
		}
		
		function LimparCamposForm()
		{
			$("#Documento").val("");
			$("#nome").val("");
			$("#email").val("");
			$("#telefone").val("");
            $("#fax").val("");
		}
		
		function RemoveLinha(Documento)
		{
            $.ajax({
                type: "DELETE",
                url: "https://localhost:44352/api/Clientes/Deletar?doc=" + Documento,
                contentType: "application/json; charset=utf-8",
                dataType: "json",
				success: function (OBJ) {
					mostrarAlerta('Cliente removido com sucesso.', 'success');
                },
                error: function (OBJ) {
                    mostrarAlerta('Erro ao remover o cliente.', 'danger');
                }

			});

			$('#Linha' + Documento).remove();
		}

		function GetCliente(Documento) {
			
            $.ajax({
                type: "GET",
                url: "https://localhost:44344/api/Clientes/GetCliente?Documento=" + Documento,
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function (OBJ) {
					$('#myModal').modal().show();

                    $("#Documento").val(OBJ.documento);
                    $("#nome").val(OBJ.nome);
                    $("#email").val(OBJ.email);
                    $("#telefone").val(OBJ.telefone);
                    $("#fax").val(OBJ.fax);
					$("#uf").val(OBJ.uf);

					//SalvarCadastro();
                },
                error: function (OBJ) {
                    mostrarAlerta('Erro ao carregar os dados do cliente.', 'danger');
                }

            });

		}

		function ListarClientes() {
            $.ajax({
                type: "GET",
                url: "https://localhost:44352/api/Clientes/Listar",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
				success: function (OBJ) {
					for (var i = 0; i < OBJ.length; i++) {

                        AdicionarLinhaTabela(OBJ[i].documento, OBJ[i].nome, OBJ[i].email, OBJ[i].telefone);

					}
									
                },
                error: function (OBJ) {
                    mostrarAlerta('Erro ao carregar a lista de clientes.', 'danger');
                }

            });

		}

	</script>
</body>
</html>
